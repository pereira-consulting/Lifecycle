  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"598d99f1-c582-400b-a0cf-c8f661dffe94\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"5c7c8486-5eae-4453-912f-25c560e02ef2\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n/* ============================================================\n   PEREIRA CONSULTING — V3 · marketing · Tessera design system\n   Clean, confident, depth-on-demand\n   ============================================================ */\n:root{\n  --bg:#0B1121;\n  --panel:#0F1A30;\n  --panel-2:#162038;\n  --panel-3:#1B2747;\n  --rule:#243056;\n  --rule-soft:#1B2540;\n  --ink:#F1F5F9;\n  --ink-soft:#CBD5E1;\n  --muted:#94A3B8;\n  --dim:#64748B;\n  --faint:#475569;\n  --accent:#60A5FA;\n  --accent-2:#93C5FD;\n  --accent-3:#3B82F6;\n  --accent-glow:rgba(96,165,250,.2);\n  --ok:#4ADE80;\n  --warn:#FBBF24;\n  --bad:#F87171;\n  --s1:#5BC4AB;--s2:#7AA6F2;--s3:#FBBF24;--s4:#A5B4FC;--s5:#4ADE80;--s6:#2563EB;--s7:#F87171;\n  --radius:10px;\n  --radius-sm:6px;\n}\n*{box-sizing:border-box;margin:0;padding:0}\nhtml{scroll-behavior:smooth}\nhtml,body{\n  background:var(--bg);color:var(--ink);\n  font-family:\"Inter Tight\",system-ui,sans-serif;\n  -webkit-font-smoothing:antialiased;font-size:15px;line-height:1.6;\n}\na{color:inherit;text-decoration:none}\nbutton{font:inherit;cursor:pointer;border:none;background:none;color:inherit}\n::selection{background:var(--accent);color:var(--bg)}\n::-webkit-scrollbar{width:8px}\n::-webkit-scrollbar-thumb{background:var(--rule);border-radius:6px}\n::-webkit-scrollbar-track{background:transparent}\n\n/* ---- ambient ---- */\nbody::before{\n  content:\"\";position:fixed;inset:0;z-index:0;pointer-events:none;\n  background:\n    radial-gradient(1200px 600px at 10% -10%, rgba(96,165,250,.08), transparent 60%),\n    radial-gradient(900px 500px at 95% 110%, rgba(59,130,246,.07), transparent 60%);\n}\n\n/* ---- layout ---- */\n.wrap{max-width:1280px;margin:0 auto;padding:0 48px;position:relative;z-index:1}\n@media(max-width:768px){.wrap{padding:0 20px}}\n\n/* ---- buttons ---- */\n.btn{\n  display:inline-flex;align-items:center;gap:8px;padding:12px 22px;\n  border-radius:var(--radius-sm);font-size:14px;font-weight:500;transition:all .2s;\n}\n.btn.primary{background:var(--accent);color:var(--bg);border:1px solid var(--accent)}\n.btn.primary:hover{background:transparent;color:var(--accent)}\n.btn.ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--rule)}\n.btn.ghost:hover{border-color:var(--accent);color:var(--accent)}\n.btn svg{width:14px;height:14px}\n\n/* ============ NAV ============ */\nnav{position:sticky;top:0;z-index:30;background:rgba(11,17,33,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--rule-soft)}\nnav .row{display:flex;align-items:center;justify-content:space-between;padding:16px 0}\n.brand{display:flex;align-items:center;gap:12px}\n.brand .mark{\n  width:28px;height:28px;border:1.5px solid var(--ink);border-radius:4px;\n  display:grid;place-items:center;position:relative;transform:rotate(-10deg);transition:transform .4s;\n}\n.brand:hover .mark{transform:rotate(0deg)}\n.brand .mark::after{content:\"\";position:absolute;inset:4px;background:var(--accent);border-radius:2px}\n.brand span{font-family:\"Fraunces\",serif;font-weight:500;font-size:17px;letter-spacing:-.01em}\nnav .links{display:flex;gap:28px;align-items:center}\nnav .links a{font-size:13.5px;color:var(--muted);transition:color .15s}\nnav .links a:hover{color:var(--ink)}\n\n/* ============ HERO ============ */\n.hero{padding:120px 0 80px;position:relative}\n.hero .kicker{\n  font-family:\"JetBrains Mono\",monospace;font-size:11px;text-transform:uppercase;\n  letter-spacing:.2em;color:var(--accent);margin-bottom:32px;\n}\n.hero h1{\n  font-family:\"Fraunces\",serif;font-weight:300;\n  font-size:clamp(44px,6vw,88px);line-height:.96;letter-spacing:-.035em;\n  max-width:1000px;margin-bottom:32px;\n}\n.hero h1 em{font-family:\"Instrument Serif\",serif;font-style:italic;color:var(--accent);font-weight:400}\n.hero .dek{\n  font-size:clamp(16px,1.4vw,19px);line-height:1.6;color:var(--ink-soft);\n  max-width:640px;margin-bottom:40px;\n}\n.hero .dek em{font-family:\"Instrument Serif\",serif;font-style:italic;color:var(--ink)}\n.hero .btn-row{display:flex;gap:12px;flex-wrap:wrap}\n\n/* ============ SECTION ============ */\nsection{padding:96px 0;border-top:1px solid var(--rule-soft);position:relative}\nsection .eyebrow{\n  font-family:\"JetBrains Mono\",monospace;font-size:11px;text-transform:uppercase;\n  letter-spacing:.2em;color:var(--accent);margin-bottom:20px;display:block;\n}\nsection h2{\n  font-family:\"Fraunces\",serif;font-weight:300;\n  font-size:clamp(32px,4vw,52px);line-height:1.06;letter-spacing:-.03em;\n  max-width:800px;margin-bottom:16px;\n}\nsection h2 em{font-family:\"Instrument Serif\",serif;font-style:italic;color:var(--accent);font-weight:400}\nsection .lede{font-size:16px;color:var(--ink-soft);max-width:600px;line-height:1.6;margin-bottom:48px}\n\n/* ============ CURVE ============ */\n.curve-wrap{\n  position:relative;background:var(--panel);border:1px solid var(--rule);border-radius:var(--radius);\n  padding:24px 28px 8px;overflow:hidden;\n  background-image:\n    linear-gradient(to right, rgba(36,48,86,.3) 1px, transparent 1px),\n    linear-gradient(to bottom, rgba(36,48,86,.3) 1px, transparent 1px);\n  background-size:80px 80px;\n}\n.curve-wrap::before{\n  content:\"\";position:absolute;inset:0;pointer-events:none;\n  background:radial-gradient(800px 400px at 60% 0%, rgba(96,165,250,.06), transparent 60%);\n}\n.curve-svg{width:100%;height:520px;display:block;position:relative;z-index:2}\n\n.cv-band-bg{transition:opacity .25s}\n.cv-band:hover .cv-band-bg{opacity:.18}\n.cv-band.active .cv-band-bg{opacity:.22}\n.cv-band.dim .cv-band-bg{opacity:.03}\n.cv-band-rule{stroke:var(--rule);stroke-width:1;stroke-dasharray:2 4;transition:opacity .25s}\n.cv-band-label{font-family:\"Inter Tight\",sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;fill:var(--muted);transition:fill .2s}\n.cv-band-num{font-family:\"JetBrains Mono\",monospace;font-size:9px;fill:var(--dim);letter-spacing:.18em}\n.cv-band:hover .cv-band-label,.cv-band.active .cv-band-label{fill:currentColor}\n.cv-zone{font-family:\"Instrument Serif\",serif;font-style:italic;font-size:12.5px;fill:var(--dim)}\n.cv-curve{fill:none;stroke:var(--ink);stroke-width:2.5;stroke-linecap:round;filter:drop-shadow(0 0 8px rgba(96,165,250,.3))}\n.cv-curve-glow{fill:none;stroke:var(--accent);stroke-width:6;stroke-linecap:round;opacity:.15;filter:blur(3px)}\n.cv-curve-fill{fill:url(#curveFill);opacity:.45}\n.cv-branch{fill:none;stroke:var(--s7);stroke-width:1.5;stroke-linecap:round;stroke-dasharray:5 5;opacity:.6}\n.cv-branch-up{fill:none;stroke:var(--s5);stroke-width:1.5;stroke-linecap:round;stroke-dasharray:5 5;opacity:.45}\n.cv-node{cursor:pointer;transition:transform .2s;transform-box:fill-box;transform-origin:center}\n.cv-node:hover{transform:scale(1.15)}\n.cv-node-outer{fill:var(--bg);stroke:var(--muted);stroke-width:1.5;transition:stroke .2s}\n.cv-node-inner{fill:var(--muted);transition:fill .2s}\n.cv-node:hover .cv-node-outer,.cv-node.active .cv-node-outer{stroke:currentColor;stroke-width:2}\n.cv-node:hover .cv-node-inner,.cv-node.active .cv-node-inner{fill:currentColor}\n.cv-node-label{font-family:\"Fraunces\",serif;font-size:13.5px;fill:var(--ink);letter-spacing:-.01em;font-weight:400}\n.cv-node-sub{font-family:\"JetBrains Mono\",monospace;font-size:9px;fill:var(--dim);letter-spacing:.14em;text-transform:uppercase}\n.cv-axis-label{font-family:\"JetBrains Mono\",monospace;font-size:9px;fill:var(--dim);letter-spacing:.12em;text-transform:uppercase}\n.cv-axis-line{stroke:var(--rule);stroke-width:1}\n.curve-hint{\n  text-align:center;padding:14px 0 4px;font-family:\"Instrument Serif\",serif;font-style:italic;\n  font-size:14px;color:var(--dim);\n}\n.curve-hint span{color:var(--accent)}\n\n/* ============ STAGE DRAWER ============ */\n.stage-drawer{\n  margin-top:16px;overflow:hidden;height:0;opacity:0;\n  border:1px solid var(--rule);border-radius:var(--radius);background:var(--panel);\n  transition:height .4s cubic-bezier(.25,.1,.25,1), opacity .3s ease;\n}\n.stage-drawer.open{opacity:1}\n.stage-drawer .inner{padding:36px 36px 40px}\n\n.sd-head{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;padding-bottom:24px;border-bottom:1px solid var(--rule);margin-bottom:24px;flex-wrap:wrap}\n.sd-head .left{}\n.sd-head .pill{\n  font-family:\"JetBrains Mono\",monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;\n  padding:5px 10px;border:1px solid currentColor;border-radius:var(--radius-sm);display:inline-block;margin-bottom:14px;\n}\n.sd-head h3{font-family:\"Fraunces\",serif;font-weight:400;font-size:36px;line-height:1.05;letter-spacing:-.025em;margin-bottom:10px}\n.sd-head h3 em{font-family:\"Instrument Serif\",serif;font-style:italic;color:currentColor}\n.sd-head .narrative{font-size:15px;color:var(--ink-soft);max-width:640px;line-height:1.65}\n.sd-head .narrative em{font-family:\"Instrument Serif\",serif;font-style:italic;color:var(--ink)}\n\n/* discipline card grid */\n.disc-grid-label{font-family:\"JetBrains Mono\",monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:14px}\n.disc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}\n.disc-card{\n  background:var(--panel-2);border:1px solid var(--rule);border-radius:var(--radius-sm);\n  padding:20px;cursor:pointer;transition:all .2s;position:relative;\n}\n.disc-card:hover{border-color:var(--accent);background:var(--panel-3);transform:translateY(-2px)}\n.disc-card .dc-nm{font-family:\"Fraunces\",serif;font-size:17px;letter-spacing:-.01em;margin-bottom:6px;color:var(--ink)}\n.disc-card .dc-sub{font-size:12.5px;color:var(--muted);line-height:1.4;margin-bottom:14px}\n.disc-card .dc-foot{display:flex;justify-content:space-between;align-items:center}\n.disc-card .dc-count{font-family:\"JetBrains Mono\",monospace;font-size:10.5px;color:var(--dim);letter-spacing:.05em}\n.disc-card .dc-arr{font-size:12px;color:var(--accent);opacity:0;transition:opacity .2s}\n.disc-card:hover .dc-arr{opacity:1}\n.disc-card.partner .dc-nm::after{content:\" ↗\";color:var(--dim);font-size:12px}\n.disc-card.partner{opacity:.8}\n.disc-card.partner:hover{opacity:1}\n\n/* ============ SERVICE OVERLAY ============ */\n.overlay-bg{\n  position:fixed;inset:0;z-index:50;background:rgba(11,17,33,.6);backdrop-filter:blur(4px);\n  opacity:0;pointer-events:none;transition:opacity .3s;\n}\n.overlay-bg.open{opacity:1;pointer-events:all}\n.overlay-panel{\n  position:fixed;top:0;right:0;bottom:0;width:min(560px,92vw);z-index:51;\n  background:var(--panel);border-left:1px solid var(--rule);\n  transform:translateX(100%);transition:transform .35s cubic-bezier(.25,.1,.25,1);\n  overflow-y:auto;\n}\n.overlay-panel.open{transform:translateX(0)}\n.overlay-panel .op-head{\n  position:sticky;top:0;z-index:2;background:var(--panel);\n  padding:24px 28px 20px;border-bottom:1px solid var(--rule);\n}\n.overlay-panel .op-back{\n  display:inline-flex;align-items:center;gap:6px;font-family:\"JetBrains Mono\",monospace;\n  font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);\n  cursor:pointer;margin-bottom:16px;transition:color .15s;background:none;border:none;\n}\n.overlay-panel .op-back:hover{color:var(--accent)}\n.overlay-panel .op-title{font-family:\"Fraunces\",serif;font-size:28px;font-weight:400;letter-spacing:-.02em;line-height:1.1;margin-bottom:6px}\n.overlay-panel .op-title em{font-family:\"Instrument Serif\",serif;font-style:italic;color:var(--accent)}\n.overlay-panel .op-led{font-family:\"JetBrains Mono\",monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim)}\n.overlay-panel .op-led em{font-style:normal;color:var(--accent)}\n.overlay-panel .op-body{padding:20px 28px 40px}\n\n.svc-card{\n  padding:20px;border-bottom:1px solid var(--rule);transition:background .15s;\n}\n.svc-card:last-child{border-bottom:none}\n.svc-card:hover{background:var(--panel-2)}\n.svc-card .sc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:12px}\n.svc-card .sc-typ{\n  font-family:\"JetBrains Mono\",monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;\n  padding:3px 8px;border:1px solid currentColor;border-radius:3px;\n}\n.svc-card .sc-price{font-family:\"JetBrains Mono\",monospace;font-size:11px;color:var(--muted)}\n.svc-card .sc-nm{font-family:\"Fraunces\",serif;font-size:18px;line-height:1.2;letter-spacing:-.01em;margin-bottom:6px}\n.svc-card .sc-desc{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:10px}\n.svc-card .sc-when{font-family:\"JetBrains Mono\",monospace;font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}\n.svc-card.productised .sc-typ{color:var(--s1)}\n.svc-card.advisory .sc-typ{color:var(--accent)}\n.svc-card.partner .sc-typ{color:var(--dim)}\n\n/* ============ HOW WE WORK ============ */\n.orch{display:grid;grid-template-columns:1.1fr 1fr;gap:64px;align-items:start}\n@media(max-width:900px){.orch{grid-template-columns:1fr;gap:40px}}\n.orch .copy p{margin-bottom:16px;color:var(--ink-soft);font-size:15.5px;line-height:1.7}\n.orch .copy p strong{color:var(--ink);font-weight:600}\n.orch .copy p em{font-family:\"Instrument Serif\",serif;font-style:italic;color:var(--accent)}\n.orch-map{border:1px solid var(--rule);border-radius:var(--radius);background:var(--panel);padding:28px;position:relative;overflow:hidden}\n.orch-map::before{content:\"\";position:absolute;inset:0;background:radial-gradient(400px 200px at 50% 0%,rgba(96,165,250,.07),transparent 70%);pointer-events:none}\n.orch-map h4{font-family:\"JetBrains Mono\",monospace;font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--dim);margin-bottom:20px;position:relative}\n.orch-hub{text-align:center;padding:16px 0 20px;border-bottom:1px solid var(--rule);margin-bottom:18px}\n.orch-hub .nm{font-family:\"Fraunces\",serif;font-size:22px;letter-spacing:-.015em}\n.orch-hub .sub{font-family:\"Instrument Serif\",serif;font-style:italic;font-size:14px;color:var(--accent);margin-top:4px}\n.orch-spokes{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--rule);border:1px solid var(--rule);border-radius:var(--radius-sm);overflow:hidden}\n.orch-spoke{background:var(--panel);padding:14px 16px;transition:background .15s}\n.orch-spoke:hover{background:var(--panel-2)}\n.orch-spoke .cat{font-family:\"JetBrains Mono\",monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}\n.orch-spoke .det{font-size:13px;color:var(--ink)}\n\n/* ============ TRIGGER WALL ============ */\n.trig-wall{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--rule);border:1px solid var(--rule);border-radius:var(--radius);overflow:hidden}\n@media(max-width:1000px){.trig-wall{grid-template-columns:repeat(2,1fr)}}\n@media(max-width:600px){.trig-wall{grid-template-columns:1fr}}\n.trig{\n  background:var(--panel);padding:24px;cursor:pointer;transition:background .2s;\n  display:flex;flex-direction:column;min-height:180px;position:relative;\n}\n.trig:hover{background:var(--panel-2)}\n.trig .sdot{position:absolute;top:24px;right:24px;width:7px;height:7px;border-radius:50%}\n.trig .stage-t{font-family:\"JetBrains Mono\",monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:16px}\n.trig .quote{font-family:\"Fraunces\",serif;font-size:16px;line-height:1.35;letter-spacing:-.01em;flex:1;color:var(--ink);margin-bottom:14px}\n.trig .quote::before{content:\"\\201C\";font-family:\"Instrument Serif\",serif;color:var(--accent);font-size:24px;line-height:0;vertical-align:-8px;margin-right:2px}\n.trig .quote::after{content:\"\\201D\";font-family:\"Instrument Serif\",serif;color:var(--accent);font-size:24px;line-height:0;vertical-align:-8px}\n.trig .svcs{font-size:12px;color:var(--muted);line-height:1.5}\n.trig .svcs strong{color:var(--ink-soft);font-weight:500}\n.trig[data-stage=\"s1\"] .sdot{background:var(--s1)}.trig[data-stage=\"s2\"] .sdot{background:var(--s2)}\n.trig[data-stage=\"s3\"] .sdot{background:var(--s3)}.trig[data-stage=\"s4\"] .sdot{background:var(--s4)}\n.trig[data-stage=\"s5\"] .sdot{background:var(--s5)}.trig[data-stage=\"s6\"] .sdot{background:var(--s6)}\n.trig[data-stage=\"s7\"] .sdot{background:var(--s7)}\n\n/* ============ VIGNETTES ============ */\n.vigs{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}\n@media(max-width:1000px){.vigs{grid-template-columns:1fr}}\n.vig{border-top:3px solid var(--rule);padding-top:20px;border-radius:2px}\n.vig .kicker{font-family:\"JetBrains Mono\",monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:14px;display:flex;justify-content:space-between}\n.vig .kicker .stage-dot{display:flex;align-items:center;gap:6px}\n.vig .kicker .dt{width:7px;height:7px;border-radius:50%}\n.vig:nth-child(1){border-top-color:var(--s2)}.vig:nth-child(1) .dt{background:var(--s2)}\n.vig:nth-child(2){border-top-color:var(--s3)}.vig:nth-child(2) .dt{background:var(--s3)}\n.vig:nth-child(3){border-top-color:var(--s5)}.vig:nth-child(3) .dt{background:var(--s5)}\n.vig h5{font-family:\"Fraunces\",serif;font-weight:400;font-size:22px;line-height:1.2;letter-spacing:-.018em;margin-bottom:16px}\n.vig h5 em{font-family:\"Instrument Serif\",serif;font-style:italic;color:var(--accent)}\n.vig .bit{display:grid;grid-template-columns:72px 1fr;gap:12px;font-size:13px;line-height:1.55;padding:12px 0;border-bottom:1px solid var(--rule-soft)}\n.vig .bit:last-child{border-bottom:none}\n.vig .bit .l{font-family:\"JetBrains Mono\",monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);padding-top:2px}\n.vig .bit .t{color:var(--ink-soft)}\n.vig .bit .t em{color:var(--ink);font-family:\"Instrument Serif\",serif;font-style:italic}\n\n/* ============ DIAGNOSTIC ============ */\n.diag{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center}\n@media(max-width:900px){.diag{grid-template-columns:1fr;gap:40px}}\n.diag .copy h3{font-family:\"Fraunces\",serif;font-weight:300;font-size:44px;line-height:1.04;letter-spacing:-.025em;margin-bottom:18px}\n.diag .copy h3 em{font-family:\"Instrument Serif\",serif;font-style:italic;color:var(--accent);font-weight:400}\n.diag .copy p{font-size:15.5px;line-height:1.65;color:var(--ink-soft);margin-bottom:16px}\n.diag-card{\n  background:linear-gradient(180deg,var(--panel-2),var(--panel));\n  border:1px solid var(--accent);border-radius:var(--radius);padding:40px 36px;position:relative;overflow:hidden;\n  box-shadow:0 24px 48px rgba(0,0,0,.35),0 0 60px rgba(96,165,250,.07) inset;\n}\n.diag-card::before{content:\"\";position:absolute;inset:0;pointer-events:none;background:radial-gradient(400px 250px at 0% 0%,rgba(96,165,250,.09),transparent 70%)}\n.diag-card>*{position:relative}\n.diag-card .caps{font-family:\"JetBrains Mono\",monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:16px;display:block}\n.diag-card h3{font-family:\"Fraunces\",serif;font-weight:300;font-size:38px;line-height:1.06;letter-spacing:-.025em;margin-bottom:10px}\n.diag-card h3 em{font-family:\"Instrument Serif\",serif;font-style:italic;color:var(--accent);font-weight:400}\n.diag-card .tag{font-family:\"Instrument Serif\",serif;font-style:italic;font-size:16px;color:var(--muted);margin-bottom:28px}\n.diag-steps{display:flex;flex-direction:column}\n.diag-step{display:grid;grid-template-columns:32px 1fr auto;gap:14px;padding:14px 0;border-top:1px solid var(--rule);align-items:center}\n.diag-step:last-child{border-bottom:1px solid var(--rule)}\n.diag-step .n{font-family:\"JetBrains Mono\",monospace;font-size:11px;color:var(--accent);letter-spacing:.08em}\n.diag-step .t{font-family:\"Fraunces\",serif;font-size:16px;letter-spacing:-.01em}\n.diag-step .d{font-family:\"JetBrains Mono\",monospace;font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}\n.diag-card .pr{margin-top:28px;display:flex;justify-content:space-between;align-items:baseline;padding-top:20px;border-top:1px solid var(--rule)}\n.diag-card .pr .amt{font-family:\"Fraunces\",serif;font-size:36px;font-weight:300;letter-spacing:-.02em}\n.diag-card .pr .amt em{font-family:\"Instrument Serif\",serif;font-style:italic;color:var(--accent)}\n.diag-card .pr .per{font-family:\"JetBrains Mono\",monospace;font-size:10px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase;text-align:right}\n.diag-card .go{margin-top:22px;width:100%;padding:14px;background:var(--accent);color:var(--bg);border:1px solid var(--accent);border-radius:var(--radius-sm);font-weight:500;font-size:14px;transition:.2s}\n.diag-card .go:hover{background:transparent;color:var(--accent)}\n\n/* ============ CTA ============ */\n.cta-section{padding:96px 0;position:relative;overflow:hidden;background:var(--panel);border-top:1px solid var(--rule-soft)}\n.cta-section::before{content:\"\";position:absolute;inset:0;background:radial-gradient(600px 350px at 25% 50%,rgba(96,165,250,.11),transparent 60%)}\n.cta-section h2{max-width:900px}\n\n/* ============ FOOTER ============ */\nfooter{padding:48px 0 32px;border-top:1px solid var(--rule-soft)}\nfooter .row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;margin-bottom:40px}\n@media(max-width:768px){footer .row{grid-template-columns:1fr 1fr}}\nfooter .brand-block p{font-family:\"Instrument Serif\",serif;font-style:italic;font-size:15px;color:var(--muted);max-width:280px;margin-top:12px;line-height:1.5}\nfooter .col h5{font-family:\"JetBrains Mono\",monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:14px}\nfooter .col a{display:block;font-size:13px;color:var(--muted);padding:5px 0;transition:color .15s}\nfooter .col a:hover{color:var(--accent)}\nfooter .base{display:flex;justify-content:space-between;padding-top:20px;border-top:1px solid var(--rule-soft);font-family:\"JetBrains Mono\",monospace;font-size:10px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;flex-wrap:wrap;gap:12px}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n\n<!-- ============ NAV ============ -->\n<nav>\n  <div class=\"wrap\">\n    <div class=\"row\">\n      <a href=\"#\" class=\"brand\">\n        <span class=\"mark\"><\u002Fspan>\n        <span>Pereira Consulting<\u002Fspan>\n      <\u002Fa>\n      <div class=\"links\">\n        <a href=\"#curve\">Lifecycle<\u002Fa>\n        <a href=\"#triggers\">Triggers<\u002Fa>\n        <a href=\"#how\">How we work<\u002Fa>\n        <a href=\"#diagnostic\">Diagnostic<\u002Fa>\n        <a href=\"#\" class=\"btn primary\" style=\"padding:8px 16px;font-size:13px\">Book a call<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ============ HERO ============ -->\n<header class=\"hero\">\n  <div class=\"wrap\">\n    <div class=\"kicker\">Tax-led advisory · Seed → Listed · Melbourne · Sydney · Singapore<\u002Fdiv>\n    <h1>\n      We partner with you across the entire <em>company lifecycle.<\u002Fem>\n    <\u002Fh1>\n    <p class=\"dek\">\n      From the founders' agreement to the prospectus and every trigger in between — one tax partner who <em>orchestrates<\u002Fem> the lawyers, auditors and corporate finance advisors around you.\n    <\u002Fp>\n    <div class=\"btn-row\">\n      <a href=\"#curve\" class=\"btn primary\">Find your stage on the curve <svg viewBox=\"0 0 14 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M7 2v10M4 9l3 3 3-3\"><\u002Fpath><\u002Fsvg><\u002Fa>\n      <a href=\"#diagnostic\" class=\"btn ghost\">Take the diagnostic →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ============ CURVE SECTION ============ -->\n<section id=\"curve\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">The lifecycle<\u002Fspan>\n    <h2>Find your stage. See what you need <em>right now.<\u002Fem><\u002Fh2>\n    <p class=\"lede\">Click any stage on the curve to see the disciplines we bring — then click a discipline to explore the services underneath.<\u002Fp>\n\n    <div class=\"curve-wrap\">\n      <svg class=\"curve-svg\" viewBox=\"0 0 1320 520\" preserveAspectRatio=\"none\" id=\"curve-svg\">\n        <defs>\n          <linearGradient id=\"curveFill\" x1=\"0\" x2=\"0\" y1=\"0\" y2=\"1\">\n            <stop offset=\"0%\" stop-color=\"var(--accent)\" stop-opacity=\".18\"><\u002Fstop>\n            <stop offset=\"100%\" stop-color=\"var(--accent)\" stop-opacity=\"0\"><\u002Fstop>\n          <\u002FlinearGradient>\n          <linearGradient id=\"bgS1\" x1=\"0\" x2=\"0\" y1=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"var(--s1)\" stop-opacity=\".06\"><\u002Fstop><stop offset=\"1\" stop-color=\"var(--s1)\" stop-opacity=\"0\"><\u002Fstop><\u002FlinearGradient>\n          <linearGradient id=\"bgS2\" x1=\"0\" x2=\"0\" y1=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"var(--s2)\" stop-opacity=\".06\"><\u002Fstop><stop offset=\"1\" stop-color=\"var(--s2)\" stop-opacity=\"0\"><\u002Fstop><\u002FlinearGradient>\n          <linearGradient id=\"bgS3\" x1=\"0\" x2=\"0\" y1=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"var(--s3)\" stop- text>\n          <\u002Fg>\n          <g class=\"cv-band\" data-s=\"s6\" style=\"color:var(--s6)\">\n            <rect class=\"cv-band-bg\" x=\"940\" y=\"50\" width=\"280\" height=\"400\" fill=\"url(#bgS6)\" opacity=\".06\"><\u002Frect>\n            <line class=\"cv-band-rule\" x1=\"1220\" y1=\"50\" x2=\"1220\" y2=\"450\"><\u002Fline>\n            <text class=\"cv-band-num\" x=\"950\" y=\"72\">06<\u002Ftext>\n            <text class=\"cv-band-label\" x=\"950\" y=\"88\">MATURE<\u002Ftext>\n          <\u002Fg>\n        <\u002Fg>\n\n        <!-- curve -->\n        <path class=\"cv-curve-fill\" d=\"M 60 420 C 140 418, 200 406, 240 380 S 320 296, 400 256 S 540 200, 660 182 S 820 154, 880 122 S 1020 64, 1140 52 L 1140 450 L 60 450 Z\"><\u002Fpath>\n        <path class=\"cv-curve-glow\" d=\"M 60 420 C 140 418, 200 406, 240 380 S 320 296, 400 256 S 540 200, 660 182 S 820 154, 880 122 S 1020 64, 1140 52\"><\u002Fpath>\n        <path class=\"cv-curve\" d=\"M 60 420 C 140 418, 200 406, 240 380 S 320 296, 400 256 S 540 200, 660 182 S 820 154, 880 122 S 1020 64, 1140 52\"><\u002Fpath>\n        <path class=\"cv-branch-up\" d=\"M 1140 52 C 1180 46, 1220 38, 1260 28\"><\u002Fpath>\n\n        <!-- nodes -->\n        <g class=\"cv-node\" data-s=\"s1\" style=\"color:var(--s1)\" transform=\"translate(120,420)\">\n          <circle class=\"cv-node-outer\" r=\"8\"><\u002Fcircle><circle class=\"cv-node-inner\" r=\"3\"><\u002Fcircle>\n          <text class=\"cv-node-label\" x=\"0\" y=\"28\" text-anchor=\"middle\">Founders set<\u002Ftext>\n        <\u002Fg>\n        <g class=\"cv-node\" data-s=\"s2\" style=\"color:var(--s2)\" transform=\"translate(280,384)\">\n          <circle class=\"cv-node-outer\" r=\"8\"><\u002Fcircle><circle class=\"cv-node-inner\" r=\"3\"><\u002Fcircle>\n          <text class=\"cv-node-label\" x=\"0\" y=\"-18\" text-anchor=\"middle\">Priced round<\u002Ftext>\n        <\u002Fg>\n        <g class=\"cv-node\" data-s=\"s3\" style=\"color:var(--s3)\" transform=\"translate(470,250)\">\n          <circle class=\"cv-node-outer\" r=\"10\"><\u002Fcircle><circle class=\"cv-node-inner\" r=\"4\"><\u002Fcircle>\n          <text class=\"cv-node-sub\" x=\"0\" y=\"-22\" text-anchor=\"middle\">SWEET SPOT<\u002Ftext>\n          <text class=\"cv-node-label\" x=\"0\" y=\"-38\" text-anchor=\"middle\">Scale-up<\u002Ftext>\n        <\u002Fg>\n        <g class=\"cv-node\" data-s=\"s4\" style=\"color:var(--s4)\" transform=\"translate(680,182)\">\n          <circle class=\"cv-node-outer\" r=\"8\"><\u002Fcircle><circle class=\"cv-node-inner\" r=\"3\"><\u002Fcircle>\n          <text class=\"cv-node-label\" x=\"0\" y=\"28\" text-anchor=\"middle\">Governance<\u002Ftext>\n        <\u002Fg>\n        <g class=\"cv-node\" data-s=\"s5\" style=\"color:var(--s5)\" transform=\"translate(860,125)\">\n          <circle class=\"cv-node-outer\" r=\"10\"><\u002Fcircle><circle class=\"cv-node-inner\" r=\"4\"><\u002Fcircle>\n          <text class=\"cv-node-label\" x=\"0\" y=\"-22\" text-anchor=\"middle\">Listing<\u002Ftext>\n        <\u002Fg>\n      <\u002Fsvg>\n      <div class=\"curve-hint\">Click a stage to explore — <span>Stages 03–06<\u002Fspan> are our commercial sweet spot<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- STAGE DRAWER -->\n    <div class=\"stage-drawer\" id=\"stage-drawer\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ HOW WE WORK ============ -->\n<section id=\"how\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">How we work<\u002Fspan>\n    <h2>Tax-led. <em>Orchestrated.<\u002Fem> One relationship.<\u002Fh2>\n    <p class=\"lede\">We lead on tax, transfer pricing, GST, employment tax, Pillar Two, governance and disputes. For everything else, we bring in named partners we've worked with for years.<\u002Fp>\n    <div class=\"orch\">\n      <div class=\"copy\">\n        <p>Most firms sell you a service. We sell you a <strong>relationship that survives every stage transition<\u002Fstrong> — the one advisor who's still in the room when your Series B becomes a US expansion becomes a pre-IPO restructure.<\u002Fp>\n        <p>The result is something most growth companies never get: <em>continuity<\u002Fem>. The same tax partner across your Series A, your first US hire, your Pillar Two readiness, your prospectus, and the ATO engagement that follows.<\u002Fp>\n        <div style=\"margin-top:24px\"><a href=\"#\" class=\"btn primary\">See our network →<\u002Fa><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"orch-map\">\n        <h4>Your orchestration map<\u002Fh4>\n        <div class=\"orch-hub\">\n          <div class=\"nm\">Pereira Consulting<\u002Fdiv>\n          <div class=\"sub\"><em>Tax partner · quarterback · continuous<\u002Fem><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"orch-spokes\">\n          <div class=\"orch-spoke\"><div class=\"cat\">Corporate law<\u002Fdiv><div class=\"det\">4 firms · seed → ASX<\u002Fdiv><\u002Fdiv>\n          <div class=\"orch-spoke\"><div class=\"cat\">External audit<\u002Fdiv><div class=\"det\">3 firms · independence-aware<\u002Fdiv><\u002Fdiv>\n          <div class=\"orch-spoke\"><div class=\"cat\">Corporate finance<\u002Fdiv><div class=\"det\">3 houses · IPO &amp; M&amp;A<\u002Fdiv><\u002Fdiv>\n          <div class=\"orch-spoke\"><div class=\"cat\">Bookkeeping<\u002Fdiv><div class=\"det\">3 providers · CFO-on-demand<\u002Fdiv><\u002Fdiv>\n          <div class=\"orch-spoke\"><div class=\"cat\">Distress<\u002Fdiv><div class=\"det\">3 firms · safe harbour<\u002Fdiv><\u002Fdiv>\n          <div class=\"orch-spoke\"><div class=\"cat\">Brokers &amp; ECM<\u002Fdiv><div class=\"det\">3 houses · ASX &amp; dual<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ TRIGGERS ============ -->\n<section id=\"triggers\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Trigger events<\u002Fspan>\n    <h2>Find the sentence <em>that just happened to you.<\u002Fem><\u002Fh2>\n    <p class=\"lede\">These are the things we hear from founders and CFOs the week before they call us. Each one opens a page of consequences — and the services that make it go away.<\u002Fp>\n    <div class=\"trig-wall\">\n      <div class=\"trig\" data-stage=\"s1\"><span class=\"sdot\"><\u002Fspan><div class=\"stage-t\">Founder<\u002Fdiv><div class=\"quote\">We're about to sign our first convertible note with an angel.<\u002Fdiv><div class=\"svcs\"><strong>Surfaces:<\u002Fstrong> SAFE/CN structuring · founder vesting · ESIC qualification.<\u002Fdiv><\u002Fdiv>\n      <div class=\"trig\" data-stage=\"s2\"><span class=\"sdot\"><\u002Fspan><div class=\"stage-t\">Seed → A<\u002Fdiv><div class=\"quote\">We're closing a priced Series A next quarter.<\u002Fdiv><div class=\"svcs\"><strong>Surfaces:<\u002Fstrong> ESS plan expansion · Div 166 COT baseline · Div 974 on convertibles.<\u002Fdiv><\u002Fdiv>\n      <div class=\"trig\" data-stage=\"s3\"><span class=\"sdot\"><\u002Fspan><div class=\"stage-t\">Scale-up<\u002Fdiv><div class=\"quote\">We just signed our first US customer — shipping services, not goods.<\u002Fdiv><div class=\"svcs\"><strong>Surfaces:<\u002Fstrong> PE risk mapping · royalty characterisation · state nexus screen.<\u002Fdiv><\u002Fdiv>\n      <div class=\"trig\" data-stage=\"s3\"><span class=\"sdot\"><\u002Fspan><div class=\"stage-t\">Scale-up<\u002Fdiv><div class=\"quote\">The board asked whether we need transfer pricing documentation.<\u002Fdiv><div class=\"svcs\"><strong>Surfaces:<\u002Fstrong> Local File scoping · ICA drafting under privilege.<\u002Fdiv><\u002Fdiv>\n      <div class=\"trig\" data-stage=\"s4\"><span class=\"sdot\"><\u002Fspan><div class=\"stage-t\">Pre-IPO<\u002Fdiv><div class=\"quote\">Our group is about to cross €750m consolidated revenue.<\u002Fdiv><div class=\"svcs\"><strong>Surfaces:<\u002Fstrong> Pillar Two TSH assessment · GIR data readiness · QDMTT modelling.<\u002Fdiv><\u002Fdiv>\n      <div class=\"trig\" data-stage=\"s4\"><span class=\"sdot\"><\u002Fspan><div class=\"stage-t\">Pre-IPO<\u002Fdiv><div class=\"quote\">The ATO has issued a risk-review questionnaire.<\u002Fdiv><div class=\"svcs\"><strong>Surfaces:<\u002Fstrong> Justified Trust response · governance evidence build.<\u002Fdiv><\u002Fdiv>\n      <div class=\"trig\" data-stage=\"s5\"><span class=\"sdot\"><\u002Fspan><div class=\"stage-t\">IPO<\u002Fdiv><div class=\"quote\">We've instructed an investigating accountant for ASX listing.<\u002Fdiv><div class=\"svcs\"><strong>Surfaces:<\u002Fstrong> IAR tax work · prospectus tax section · Div 615 rollover.<\u002Fdiv><\u002Fdiv>\n      <div class=\"trig\" data-stage=\"s7\"><span class=\"sdot\"><\u002Fspan><div class=\"stage-t\">Distress<\u002Fdiv><div class=\"quote\">We've received a Director Penalty Notice.<\u002Fdiv><div class=\"svcs\"><strong>Surfaces:<\u002Fstrong> s588GA safe-harbour · ATO payment plan · distress referral.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ PROOF ============ -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Proof<\u002Fspan>\n    <h2>Three companies. Three stages. <em>Three moves that mattered.<\u002Fem><\u002Fh2>\n    <p class=\"lede\">Anonymised client vignettes — trigger, consequence, intervention, outcome.<\u002Fp>\n    <div class=\"vigs\">\n      <div class=\"vig\">\n        <div class=\"kicker\"><span>Seed · Medtech · Melbourne<\u002Fspan><span class=\"stage-dot\"><span class=\"dt\"><\u002Fspan>Stage 02<\u002Fspan><\u002Fdiv>\n        <h5>The <em>FDA clearance<\u002Fem> with no US tax framework.<\u002Fh5>\n        <div class=\"bit\"><div class=\"l\">Trigger<\u002Fdiv><div class=\"t\">Pre-revenue Australian medtech with US FDA clearance. Co-founder relocating to the US; no intercompany agreements in place.<\u002Fdiv><\u002Fdiv>\n        <div class=\"bit\"><div class=\"l\">Risk<\u002Fdiv><div class=\"t\">Uncontrolled <em>PE exposure<\u002Fem> in the US; no TP policy for cross-border IP flows; RDTI claim at risk without DEMPE alignment.<\u002Fdiv><\u002Fdiv>\n        <div class=\"bit\"><div class=\"l\">Move<\u002Fdiv><div class=\"t\">Fixed-fee integrated tax, TP and ICA package calibrated to pre-revenue stage. Arm's length pricing set for every intercompany flow.<\u002Fdiv><\u002Fdiv>\n        <div class=\"bit\"><div class=\"l\">Outcome<\u002Fdiv><div class=\"t\">Audit-ready framework for first revenue cycle. RDTI-ready. Investor DD-proof without re-engineering.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"vig\">\n        <div class=\"kicker\"><span>Scale-up · Medtech · Sydney<\u002Fspan><span class=\"stage-dot\"><span class=\"dt\"><\u002Fspan>Stage 03<\u002Fspan><\u002Fdiv>\n        <h5>The <em>inbound R&amp;D<\u002Fem> the ATO was watching.<\u002Fh5>\n        <div class=\"bit\"><div class=\"l\">Trigger<\u002Fdiv><div class=\"t\">UK parent established Australian subsidiary for a substantive R&amp;D programme. IP licence and subscription agreement untested against ATO integrity rules.<\u002Fdiv><\u002Fdiv>\n        <div class=\"bit\"><div class=\"l\">Risk<\u002Fdiv><div class=\"t\"><em>\"For itself\" and \"at risk\"<\u002Fem> challenge under Division 355; TA 2023/4 and PCG 2024/1 substance expectations not met.<\u002Fdiv><\u002Fdiv>\n        <div class=\"bit\"><div class=\"l\">Move<\u002Fdiv><div class=\"t\">Privileged legal, tax and TP review of intercompany agreements. Targeted changes to IP, funding and distribution arrangements.<\u002Fdiv><\u002Fdiv>\n        <div class=\"bit\"><div class=\"l\">Outcome<\u002Fdiv><div class=\"t\">Defensible RDTI position. Contained Australian tax footprint. Documentation aligned with ATO substance expectations.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"vig\">\n        <div class=\"kicker\"><span>Pre-IPO · Biotech · Offshore-listed<\u002Fspan><span class=\"stage-dot\"><span class=\"dt\"><\u002Fspan>Stage 04<\u002Fspan><\u002Fdiv>\n        <h5>Five compounds, one <em>transfer pricing<\u002Fem> framework.<\u002Fh5>\n        <div class=\"bit\"><div class=\"l\">Trigger<\u002Fdiv><div class=\"t\">Listed biotech with multiple drug candidates in clinical trials through Australian subsidiary. Compounds progressing through milestones and out-licensing.<\u002Fdiv><\u002Fdiv>\n        <div class=\"bit\"><div class=\"l\">Risk<\u002Fdiv><div class=\"t\">No consistent <em>TP position<\u002Fem> across compounds; each asset needed a defensible commercial rationale to support the RDTI claim and withstand ATO scrutiny.<\u002Fdiv><\u002Fdiv>\n        <div class=\"bit\"><div class=\"l\">Move<\u002Fdiv><div class=\"t\">Commercial rationale and TP report per compound, coordinated with R&amp;D adviser and independent valuer. Single audit-ready document per asset.<\u002Fdiv><\u002Fdiv>\n        <div class=\"bit\"><div class=\"l\">Outcome<\u002Fdiv><div class=\"t\">Consistent TP position across the pipeline. Adopted for board approval, audit response, and investor engagement. Framework scaled with new compounds.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ DIAGNOSTIC ============ -->\n<section id=\"diagnostic\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">The product<\u002Fspan>\n    <div class=\"diag\">\n      <div class=\"copy\">\n        <h3>The Lifecycle <em>Diagnostic.<\u002Fem><\u002Fh3>\n        <p>A recurring six-monthly retainer that places you on the curve, flags the triggers that have already fired, forecasts what's coming in the next 12 months, and prioritises the three work items that matter most.<\u002Fp>\n        <p>Written to the board. Fixed-fee. No surprises.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"diag-card\">\n        <span class=\"caps\">Lifecycle Diagnostic · v.2026<\u002Fspan>\n        <h3>Know what's coming <em>before it hits.<\u002Fem><\u002Fh3>\n        <div class=\"tag\"><em>Six-monthly. Fixed-fee. Written to the board.<\u002Fem><\u002Fdiv>\n        <div class=\"di ual\",\"from A$15k\"],\n        ],\n        tp:[\n          [\"productised\",\"Full TP documentation suite\",\"Local · Master · CbCR · ICAs.\",\"Annual\",\"from A$15k\"],\n          [\"advisory\",\"APA / MAP execution\",\"Bilateral APA management · MAP.\",\"Project\",\"scoped\"],\n        ],\n        p2:[\n          [\"productised\",\"GIR co-ordination & lodgment\",\"Annual GIR data assembly.\",\"Annual\",\"from A$25k\"],\n        ],\n        governance:[\n          [\"productised\",\"Streamlined assurance review prep\",\"Top 1000 engagement support.\",\"Per cycle\",\"partner-priced\"],\n        ],\n        disputes:[\n          [\"advisory\",\"Objection & ART\",\"Drafting · representation · settlement.\",\"Per matter\",\"scoped\"],\n        ],\n        ma:[\n          [\"advisory\",\"Bolt-on acquisition tax\",\"Entry ACA · loss transfer · integration.\",\"Per deal\",\"scoped\"],\n        ],\n      }\n  },\n  s7:{i:7,k:\"s7\",name:\"Pivot / Distress\",sub:\"Lateral track · off the growth curve\",\n      where:\"When the curve bends the other way, directors need tax advice that is fast, defensible, and sequenced with insolvency counsel. <em>We can be in the room within 48 hours.<\u002Fem>\",\n      services:{\n        tax:[\n          [\"productised\",\"DPN response & compliance plan\",\"Remittance · lodgment clean-up · ATO rep.\",\"Per matter\",\"from A$10k\"],\n          [\"advisory\",\"Debt forgiveness / Div 245\",\"Commercial debt forgiveness analysis.\",\"Per matter\",\"scoped\"],\n        ],\n        disputes:[\n          [\"advisory\",\"ATO negotiation\",\"Payment arrangement · GIC remission.\",\"Per matter\",\"scoped\"],\n        ],\n        governance:[\n          [\"advisory\",\"s588GA safe-harbour memo\",\"Director evidence pack.\",\"Per matter\",\"scoped\"],\n        ],\n        distress:[\n          [\"partner\",\"Voluntary administration\",\"Insolvency partner firm — VA or wind-down.\",\"Per matter\",\"partner-priced\"],\n        ],\n        legal:[\n          [\"partner\",\"Insolvency counsel\",\"Directors' duties advice in distress.\",\"Per matter\",\"partner-priced\"],\n        ],\n      }\n  },\n};\n\n/* =========================================================\n   DRAWER — smooth open/close with measured height\n   ========================================================= */\nconst drawer = document.getElementById('stage-drawer');\n\nfunction openDrawer(){\n  drawer.style.transition='none';\n  drawer.style.height='auto'; drawer.style.opacity='1';\n  const h = drawer.scrollHeight;\n  drawer.style.height='0px'; drawer.style.opacity='0';\n  drawer.offsetHeight; // reflow\n  drawer.style.transition='';\n  drawer.style.height=h+'px'; drawer.style.opacity='1';\n  drawer.classList.add('open');\n  const done=()=>{drawer.style.height='auto';drawer.removeEventListener('transitionend',done)};\n  drawer.addEventListener('transitionend',done);\n}\n\nfunction closeDrawer(){\n  drawer.style.transition='none';\n  drawer.style.height=drawer.scrollHeight+'px';\n  drawer.offsetHeight;\n  drawer.style.transition='';\n  drawer.style.height='0px'; drawer.style.opacity='0';\n  drawer.classList.remove('open');\n}\n\n/* =========================================================\n   OVERLAY — slide-in service detail panel\n   ========================================================= */\nconst overlayBg = document.getElementById('overlay-bg');\nconst overlayPanel = document.getElementById('overlay-panel');\n\nfunction openOverlay(stage, dk){\n  const d = DISC[dk];\n  const services = stage.services[dk] || [];\n  const cards = services.map(([typ,nm,desc,when,price])=>{\n    const label = typ==='productised'?'Fixed-fee':typ==='advisory'?'Advisory':'Partner-led';\n    return `<div class=\"svc-card ${typ}\">\n      <div class=\"sc-top\"><span class=\"sc-typ\">${label}<\u002Fspan><span class=\"sc-price\">${price}<\u002Fspan><\u002Fdiv>\n      <div class=\"sc-nm\">${nm}<\u002Fdiv>\n      <div class=\"sc-desc\">${desc}<\u002Fdiv>\n      <div class=\"sc-when\">${when}<\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n\n  overlayPanel.innerHTML=`\n    <div class=\"op-head\">\n      <button class=\"op-back\" id=\"op-close\">← Back<\u002Fbutton>\n      <div class=\"op-title\">${d.nm} <em>—<\u002Fem><\u002Fdiv>\n      <div class=\"op-led\">Led by · <em>${d.led}<\u002Fem><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"op-body\">${cards}<\u002Fdiv>\n  `;\n  overlayBg.classList.add('open');\n  overlayPanel.classList.add('open');\n  document.getElementById('op-close').addEventListener('click', closeOverlay);\n}\n\nfunction closeOverlay(){\n  overlayBg.classList.remove('open');\n  overlayPanel.classList.remove('open');\n}\noverlayBg.addEventListener('click', closeOverlay);\n\n/* =========================================================\n   RENDER STAGE — clean: title + narrative + discipline cards\n   ========================================================= */\nfunction renderStage(k){\n  const s = STAGES[k];\n  const colour = `var(--${k})`;\n  const discKeys = Object.keys(s.services);\n  const totalSvcs = discKeys.reduce((n,dk)=>n+s.services[dk].length,0);\n\n  const cards = discKeys.map(dk=>{\n    const d = DISC[dk];\n    const ct = s.services[dk].length;\n    return `<div class=\"disc-card${d.partner?' partner':''}\" data-d=\"${dk}\">\n      <div class=\"dc-nm\">${d.nm}<\u002Fdiv>\n      <div class=\"dc-sub\">${d.sub}<\u002Fdiv>\n      <div class=\"dc-foot\">\n        <span class=\"dc-count\">${ct} service${ct!==1?'s':''}<\u002Fspan>\n        <span class=\"dc-arr\">Explore →<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n\n  drawer.innerHTML=`\n    <div class=\"inner\">\n      <div class=\"sd-head\" style=\"color:${colour}\">\n        <div class=\"left\">\n          <span class=\"pill\">${s.i<7?'Stage 0'+s.i:'Lateral'}<\u002Fspan>\n          <h3>${s.name} <em>—<\u002Fem> ${s.sub}<\u002Fh3>\n          <div class=\"narrative\">${s.where}<\u002Fdiv>\n        <\u002Fdiv>\n        <a href=\"#diagnostic\" class=\"btn primary\" style=\"white-space:nowrap\">Take the diagnostic →<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"disc-grid-label\">${discKeys.length} disciplines · ${totalSvcs} services at this stage<\u002Fdiv>\n      <div class=\"disc-grid\">${cards}<\u002Fdiv>\n    <\u002Fdiv>\n  `;\n  openDrawer();\n\n  // discipline card → open overlay\n  drawer.querySelectorAll('.disc-card').forEach(c=>{\n    c.addEventListener('click',()=>{\n      openOverlay(s, c.getAttribute('data-d'));\n    });\n  });\n}\n\n/* =========================================================\n   CURVE + TRIGGER INTERACTION\n   ========================================================= */\ndocument.querySelectorAll('.cv-band, .cv-node').forEach(el=>{\n  el.addEventListener('click',()=>{\n    const k = el.getAttribute('data-s');\n    document.querySelectorAll('.cv-band').forEach(b=>b.classList.remove('active','dim'));\n    document.querySelectorAll('.cv-node').forEach(n=>n.classList.remove('active'));\n    document.querySelectorAll(`.cv-band[data-s=\"${k}\"]`).forEach(b=>b.classList.add('active'));\n    document.querySelectorAll(`.cv-node[data-s=\"${k}\"]`).forEach(n=>n.classList.add('active'));\n    renderStage(k);\n    setTimeout(()=>drawer.scrollIntoView({behavior:'smooth',block:'nearest'}),80);\n  });\n});\n\ndocument.querySelectorAll('.trig').forEach(t=>{\n  t.addEventListener('click',()=>{\n    const k = t.getAttribute('data-stage');\n    document.querySelectorAll('.cv-band').forEach(b=>b.classList.remove('dim','active'));\n    document.querySelectorAll(`.cv-band[data-s=\"${k}\"]`).forEach(b=>b.classList.add('active'));\n    renderStage(k);\n    setTimeout(()=>document.getElementById('curve').scrollIntoView({behavior:'smooth'}),80);\n  });\n});\n\n/* =========================================================\n   INITIAL — open Scale-up by default\n   ========================================================= */\nrenderStage('s3');\ndocument.querySelectorAll('.cv-band[data-s=\"s3\"]').forEach(b=>b.classList.add('active'));\ndocument.querySelectorAll('.cv-node[data-s=\"s3\"]').forEach(n=>n.classList.add('active'));\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
